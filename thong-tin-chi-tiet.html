<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài viết | Vệ Binh Số</title>
    <link rel="icon" href="./assets/icons/logo_header.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>
    <div id="header"></div>

    <main class="container-detail" style="max-width: 1200px; margin: 50px auto; padding: 0 20px;">
        <div id="detailRender">
            <p style="text-align: center; color: #666;">Đang tải nội dung...</p>
        </div>
    </main>

    <div id="footer"></div>

    <script src="./js/layout.js"></script>
    <script>
        async function loadContent() {
            const renderContainer = document.getElementById('detailRender');
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));

            if (!id) {
                renderContainer.innerHTML = '<p style="text-align: center;">Không tìm thấy ID bài viết.</p>';
                return;
            }

            try {
                // Fetch dữ liệu từ data.json
                const res = await fetch('./data/data.json');
                const data = await res.json();
                
                // Tìm bài viết trong mảng NEWS_DATA (hoặc đổi thành SKILLS_DATA tùy file của bạn)
                const article = data.NEWS_DATA.find(n => n.id === id);

                if (!article) {
                    renderContainer.innerHTML = '<p style="text-align: center;">Bài viết không tồn tại.</p>';
                    return;
                }

                // Cập nhật tiêu đề trang web
                document.title = article.title + " | Vệ Binh Số";

                // 1. Render phần Header và Ảnh bìa
                let html = `
                    <div class="article-header" style="margin-bottom: 40px; text-align: center;">
                        <span class="tag ${article.tagClass}" style="padding: 5px 15px; border-radius: 20px; font-weight: 600;">
                            ${article.label}
                        </span>
                        <h1 style="font-size: clamp(28px, 5vw, 42px); font-weight: 800; margin: 20px 0; line-height: 1.2;">
                            ${article.title}
                        </h1>
                        <p style="font-size: 20px; color: #4b5563; font-weight: 600; line-height: 1.6; max-width: 900px; margin: 0 auto;">
                            ${article.sapo}
                        </p>
                        <div style="margin-top: 20px; color: #999;">🕒 ${article.time} | Tác giả: Vệ Binh Số</div>
                    </div>

                    <img src="${article.img}" alt="${article.title}" style="width: 100%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 40px; object-fit: cover;">
                    
                    <div class="article-body" style="font-size: 18px; line-height: 1.9; color: #333; max-width: 800px; margin: 0 auto;">
                `;

                // 2. Render nội dung chi tiết (Duyệt qua từng block trong content)
                article.content.forEach(block => {
                    switch (block.type) {
                        case 'paragraph':
                            html += `<p style="margin-bottom: 25px; text-align: justify;">${block.text}</p>`;
                            break;

                        case 'heading':
                            html += `<h2 style="font-size: 28px; font-weight: 700; margin-top: 50px; margin-bottom: 20px; color: #111827;">${block.text}</h2>`;
                            break;

                        case 'quote':
                            html += `<div class="quote-block" style="border-left: 5px solid #2563eb; padding: 30px; background: #f0f7ff; font-style: italic; margin: 40px 0; border-radius: 0 12px 12px 0;">${block.text}</div>`;
                            break;

                        case 'alert':
                            const alertColor = block.level === 'danger' ? '#ef4444' : '#f59e0b';
                            const alertBg = block.level === 'danger' ? '#fef2f2' : '#fffbeb';
                            html += `
                                <div class="alert-block" style="padding: 25px; border-radius: 12px; margin: 30px 0; font-weight: 600; background: ${alertBg}; border-left: 5px solid ${alertColor};">
                                    ⚠️ ${block.text}
                                </div>`;
                            break;

                        case 'image':
                            html += `
                                <figure style="margin: 40px 0; text-align: center;">
                                    <img src="${block.src}" alt="${block.caption}" style="width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
                                    <figcaption style="margin-top: 10px; font-size: 14px; color: #6b7280; font-style: italic;">${block.caption}</figcaption>
                                </figure>`;
                            break;

                        case 'reference':
                            const refLinks = block.items.map(ref => `
                                <li style="margin-bottom: 10px;">
                                    <i class="fas fa-link" style="font-size: 12px; color: #3b82f6; margin-right: 8px;"></i>
                                    <a href="${ref.url}" target="_blank" rel="noopener noreferrer" style="color: #2563eb; text-decoration: none; font-weight: 500;">
                                        ${ref.label}
                                    </a>
                                </li>
                            `).join('');
                            
                            html += `
                                <div class="reference-box" style="margin-top: 50px; padding: 30px; background: #f8fafc; border-radius: 16px; border: 1px solid #e2e8f0;">
                                    <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #1e293b;">Nguồn tham khảo:</h3>
                                    <ul style="list-style: none; padding: 0; margin: 0;">${refLinks}</ul>
                                </div>`;
                            break;
                    }
                });

                html += `</div>`; // Đóng article-body
                renderContainer.innerHTML = html;

            } catch (err) { 
                console.error("Lỗi tải tin:", err); 
                renderContainer.innerHTML = '<p style="text-align: center; color: red;">Không thể tải nội dung bài viết. Vui lòng thử lại sau.</p>';
            }
        }
        window.onload = loadContent;
    </script>
</body>

</html>
