<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung tâm Cảnh báo | Vệ Binh Số</title>
    <link rel="icon" href="/assets/icons/logo_header.ico">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="header"></div>

    <main class="news-section">
        <header class="news-header">
            <h2 class="news-header__title">Trung tâm Cảnh báo</h2>
            <p class="news-header__desc">Hệ thống giám sát và cập nhật liên tục các thủ đoạn lừa đảo trực tuyến mới nhất để bảo vệ bản thân và gia đình.</p>
        </header>

        <div class="news-search">
            <input type="text" id="searchInput" class="news-search__input" placeholder="Đang tải gợi ý...">
        </div>

        <div id="categoryFilter" class="news-filter">
            </div>

        <div id="newsFeed" class="news-grid">
            <p style="grid-column: 1/-1; text-align: center; color: #64748b;">Đang tải dữ liệu tin tức...</p>
        </div>

        <div id="pagination" class="news-pagination"></div>
    </main>

    <div id="footer"></div>

    <script src="/js/layout.js"></script>
    <script src="/js/news.js"></script>
</body>
</html>
