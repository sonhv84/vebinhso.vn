<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Báo cáo thủ đoạn lừa đảo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>
    /* ================= RESET ================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #f4f6f8;
      color: #1f2937;
    }

    /* ================= SECTION ================= */
    .report-section {
      padding: 4rem 1rem;
    }

    /* ================= FORM CARD ================= */
    .report-form {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.08);
    }

    .form-title {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 800;
      color: #dc2626;
      margin-bottom: 0.5rem;
    }

    .form-subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }

    /* ================= FORM GRID ================= */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    /* ================= INPUT ================= */
    input,
    select,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
      background: #ffffff;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    textarea {
      resize: vertical;
      min-height: 140px;
    }

    /* ================= UPLOAD (FIX CHUẨN) ================= */
    .upload-box {
      display: flex;                 /* QUAN TRỌNG */
      flex-direction: column;
      align-items: center;
      justify-content: center;

      width: 100%;
      min-height: 180px;             /* QUAN TRỌNG */

      border: 2px dashed #cbd5e1;
      border-radius: 14px;
      padding: 2rem 1.5rem;

      text-align: center;
      cursor: pointer;
      color: #475569;
      background: #ffffff;

      transition: all 0.25s ease;
    }

    .upload-box i {
      font-size: 2.4rem;
      color: #2563eb;
      margin-bottom: 0.75rem;
    }

    .upload-box strong {
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }

    .upload-box p {
      font-size: 0.875rem;
      color: #64748b;
      max-width: 420px;
      line-height: 1.4;
    }

    .upload-box:hover {
      background: #f8fafc;
      border-color: #2563eb;
    }

    .upload-box.active {
      background: #f0fdf4;
      border-color: #16a34a;
    }

    /* ================= BUTTON ================= */
    .submit-btn {
      margin-top: 2rem;
      width: 100%;
      background: #dc2626;
      color: #ffffff;
      border: none;
      padding: 18px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 10px 25px rgba(220,38,38,0.35);
    }

    .submit-btn:hover {
      background: #b91c1c;
      transform: translateY(-2px);
    }

    .form-note {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
      color: #64748b;
    }

    /* ================= RESPONSIVE ================= */
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .report-form {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>

<section class="report-section">
  <form class="report-form" id="scamReportForm">

    <h1 class="form-title">Báo Cáo Thủ Đoạn Lừa Đảo</h1>
    <p class="form-subtitle">
      Thu thập thông tin nhằm tuyên truyền, cảnh báo và bảo vệ cộng đồng trước tội phạm mạng
    </p>

    <!-- Họ tên + đối tượng -->
    <div class="form-row">
      <input
        type="text"
        name="reporterName"
        placeholder="Họ và tên (có thể ẩn danh)"
        maxlength="100"
      />

      <input
        type="text"
        name="scammerContact"
        placeholder="Số điện thoại / Link / Tài khoản lừa đảo *"
        required
      />
    </div>

    <!-- Loại lừa đảo -->
    <div class="form-group">
      <select name="scamType" required>
        <option value="">Chọn loại hình lừa đảo *</option>
        <option>Giả danh công an / tòa án</option>
        <option>Chiếm đoạt tài khoản mạng xã hội</option>
        <option>Lừa đảo đầu tư / tiền ảo</option>
        <option>Việc nhẹ lương cao</option>
        <option>Gọi điện trúng thưởng</option>
        <option>Mạo danh ngân hàng / ví điện tử</option>
        <option>Khác</option>
      </select>
    </div>

    <!-- Mô tả -->
    <div class="form-group">
      <textarea
        name="description"
        placeholder="Mô tả chi tiết thủ đoạn: cách tiếp cận, nội dung trao đổi, dấu hiệu nhận biết..."
        required
      ></textarea>
    </div>

    <!-- Upload bằng chứng -->
    <div class="form-group">
      <input
        type="file"
        id="evidence"
        name="evidence"
        accept="image/*,audio/*"
        hidden
      />

      <label for="evidence" class="upload-box" id="uploadBox">
        <i class="fas fa-cloud-upload-alt"></i>
        <strong>Nhấn để tải lên bằng chứng</strong>
        <p id="fileName">
          Ảnh chụp màn hình, ghi âm cuộc gọi (không bắt buộc)
        </p>
      </label>
    </div>

    <!-- Submit -->
    <button type="submit" class="submit-btn">
      GỬI BÁO CÁO NGAY
    </button>

    <p class="form-note">
      Không thu thập dữ liệu nhạy cảm. Thông tin phục vụ mục đích cảnh báo cộng đồng.
    </p>

  </form>
</section>

<script>
  // ===== Upload hiển thị tên file =====
  const evidenceInput = document.getElementById("evidence");
  const fileName = document.getElementById("fileName");
  const uploadBox = document.getElementById("uploadBox");

  evidenceInput.addEventListener("change", function () {
    if (this.files && this.files.length > 0) {
      fileName.textContent = "Đã chọn: " + this.files[0].name;
      uploadBox.classList.add("active");
    } else {
      fileName.textContent =
        "Ảnh chụp màn hình, ghi âm cuộc gọi (không bắt buộc)";
      uploadBox.classList.remove("active");
    }
  });

  // ===== Validate form =====
  document
    .getElementById("scamReportForm")
    .addEventListener("submit", function (e) {
      e.preventDefault();

      const contact = this.scammerContact.value.trim();
      const type = this.scamType.value;
      const desc = this.description.value.trim();

      if (!contact || !type || desc.length < 20) {
        alert(
          "Vui lòng nhập đầy đủ thông tin và mô tả tối thiểu 20 ký tự."
        );
        return;
      }

      alert(
        "Báo cáo đã được ghi nhận. Cảm ơn bạn đã chung tay phòng chống lừa đảo!"
      );
      window.location.href = "/index.html";

      this.reset();
      uploadBox.classList.remove("active");
      fileName.textContent =
        "Ảnh chụp màn hình, ghi âm cuộc gọi (không bắt buộc)";
    });
</script>

</body>
</html>
