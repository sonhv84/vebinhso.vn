<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài viết | Vệ Binh Số</title>
    <link rel="icon" href="./assets/icons/logo_header.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>

    <div id="header"></div>

    <main class="container-detail" style="max-width:1200px;margin:50px auto;padding:0 20px;">
        <div id="detailRender"></div>
    </main>

    <div id="footer"></div>

    <script src="./js/layout.js"></script>

    <script>
        async function loadContent() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get("id"));

            if (!id) {
                document.getElementById("detailRender").innerHTML = `<p style="text-align:center;">Không tìm thấy ID bài viết.</p>`;
                return;
            }

            try {
                // Đảm bảo đường dẫn file json chính xác (data.json hoặc skills.json)
                const res = await fetch("./data/skills.json"); 
                const data = await res.json();

                // Tìm bài viết theo ID (Lưu ý: DATA_NEWS hoặc SKILLS_DATA tùy file của bạn)
                const item = (data.SKILLS_DATA || data.NEWS_DATA).find(s => s.id === id);

                if (!item) {
                    document.getElementById("detailRender").innerHTML = `<p style="text-align:center;">Bài viết không tồn tại.</p>`;
                    return;
                }

                // 1. Khởi tạo phần Header (Tiêu đề, Mô tả, Ảnh chính)
                let html = `
                <div class="article-header" style="margin-bottom:40px;text-align:center;">
                    <span class="tag ${item.tagClass}" style="padding: 5px 15px; border-radius: 20px; font-weight: 600;">
                        ${item.label}
                    </span>

                    <h1 style="font-size:42px;font-weight:800;margin:20px 0; line-height:1.2;">
                        ${item.title}
                    </h1>

                    <p style="font-size:20px;color:#4b5563;font-weight:600;line-height:1.6;max-width:900px;margin:0 auto;">
                        ${item.desc}
                    </p>

                    <div style="margin-top:20px;color:#999; font-size: 15px;">
                        <i class="far fa-clock"></i> Cập nhật: ${item.time}
                    </div>
                </div>

                <img 
                    src="${item.img}" 
                    style="width:100%; height:auto; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); margin-bottom:40px;"
                >

                <div class="article-body" style="font-size:18px; line-height:1.9; color:#333; max-width:800px; margin:0 auto;">
                `;

                // 2. Duyệt qua mảng content để render từng block nội dung
                if (item.content && item.content.length > 0) {
                    item.content.forEach(block => {
                        switch (block.type) {
                            case "heading":
                                html += `<h2 style="font-size:28px; font-weight:700; margin-top:50px; margin-bottom:20px; color: #1a202c;">${block.text}</h2>`;
                                break;
                            
                            case "paragraph":
                                html += `<p style="margin-bottom:25px; text-align: justify;">${block.text}</p>`;
                                break;

                            case "quote":
                                html += `
                                <div class="quote-block" style="border-left:5px solid #2563eb; padding:30px; background:#f0f7ff; font-style:italic; margin:40px 0; border-radius:0 12px 12px 0;">
                                    "${block.text}"
                                </div>`;
                                break;

                            case "alert":
                                const alertBg = block.level === 'danger' ? '#fee2e2' : '#fff3cd';
                                const alertBorder = block.level === 'danger' ? '#ef4444' : '#ffc107';
                                html += `
                                <div class="alert-block" style="padding:25px; border-radius:12px; margin:30px 0; font-weight:600; background:${alertBg}; border-left: 5px solid ${alertBorder};">
                                    ⚠️ ${block.text}
                                </div>`;
                                break;

                            case "image":
                                html += `
                                <figure style="margin:40px 0; text-align:center;">
                                    <img src="${block.src}" alt="${block.caption || ''}" style="width:100%; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,0.08);">
                                    <figcaption style="margin-top:12px; font-size:14px; color:#6b7280; font-style: italic;">${block.caption || ''}</figcaption>
                                </figure>`;
                                break;

                            case "list":
                                const listItems = block.items.map(li => `<li style="margin-bottom:10px;">${li}</li>`).join('');
                                html += `<ul style="margin:25px 0 35px 20px; padding-left:15px; list-style-type: disc;">${listItems}</ul>`;
                                break;

                            case "reference":
                                const refs = block.items.map(ref => `
                                    <li style="margin-bottom:12px;">
                                        <i class="fas fa-external-link-alt" style="font-size: 13px; color: #3b82f6; margin-right: 8px;"></i>
                                        <a href="${ref.url}" target="_blank" rel="noopener noreferrer" style="color:#2563eb; text-decoration:none; font-weight:500;">
                                            ${ref.label}
                                        </a>
                                    </li>`).join('');
                                
                                html += `
                                <div class="reference-box" style="margin-top:60px; padding:30px; background:#f8fafc; border-radius:16px; border: 1px solid #e2e8f0;">
                                    <h3 style="font-size:20px; font-weight:700; margin-bottom:20px; color:#1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">
                                        Nguồn tham khảo
                                    </h3>
                                    <ul style="list-style:none; padding:0; margin:0;">
                                        ${refs}
                                    </ul>
                                </div>`;
                                break;
                        }
                    });
                } else {
                    html += `<p style="text-align:center; color:#999;">Nội dung đang được cập nhật...</p>`;
                }

                html += `</div>`; // Đóng article-body

                document.getElementById("detailRender").innerHTML = html;

            } catch (err) {
                console.error("Lỗi tải dữ liệu:", err);
                document.getElementById("detailRender").innerHTML = `<p style="text-align:center; color:red;">Không thể tải nội dung. Vui lòng thử lại sau.</p>`;
            }
        }

        window.onload = loadContent;
    </script>

</body>
</html>
